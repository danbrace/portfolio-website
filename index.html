<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>Dan Brace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <canvas id="bg-canvas"></canvas>

  <nav>
    <a class="nav-name" href="#hero">Dan Brace</a>
    <div class="nav-right">
      <a href="#about">About</a>
      <a href="#experience">Experience</a>
      <a href="#projects">Projects</a>
      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <div class="page">

    <section id="hero">
      <p class="hero-index" id="hero-kicker"></p>
      <h1 class="hero-title" id="hero-title">Daniel<br><em>Brace</em></h1>
      <div class="hero-sub">
        <div class="hero-role" id="hero-role"></div>
        <p class="hero-desc" id="hero-desc"></p>
      </div>
    </section>

    <section id="about" class="section">
      <div class="section-head">
        <span class="section-num">01</span>
        <h2 class="section-title">About</h2>
      </div>
      <p class="about-text" id="about-bio"></p>
    </section>

    <section id="experience" class="section">
      <div class="section-head">
        <span class="section-num">02</span>
        <h2 class="section-title">Experience</h2>
      </div>
      <div id="experience-list"></div>
    </section>

    <section id="projects" class="section">
      <div class="section-head">
        <span class="section-num">03</span>
        <h2 class="section-title">Projects</h2>
      </div>
      <div id="projects-list"></div>
    </section>

    <section id="skills" class="section">
      <div class="section-head">
        <span class="section-num">04</span>
        <h2 class="section-title">Skills</h2>
      </div>
      <div class="skills-grid" id="skills-grid"></div>
    </section>

    <section id="contact" class="section">
      <div class="section-head">
        <span class="section-num">05</span>
        <h2 class="section-title">Contact</h2>
      </div>
      <p class="contact-statement">Got a project, role, or idea?<br><em>Let's connect.</em></p>
      <div id="contact-list"></div>
    </section>

    <footer>
      <span>Dan Brace © 2026</span>
    </footer>

  </div>

  <script src="js/canvas.js" defer></script>
  <script src="js/data.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
